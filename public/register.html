<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChess — Register</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #0d1117;
      --surface: #181b20;
      --surface2: #1f2229;
      --border-glass: rgba(255,255,255,0.08);
      --border-active: rgba(255,255,255,0.2);
      --text-bright: #f0f3f7;
      --text-dim: #8b949e;
      --text-muted: #5c6470;
      --emerald: #3fb950;
      --emerald-glow: rgba(63,185,80,0.3);
      --accent-cyan: #06b6d4;
      --cyan-glow: rgba(6,182,212,0.3);
      --gold: #d2991d;
      --red-soft: #f85149;
      --glass-surface: rgba(24, 27, 32, 0.65);
      --glass-border: rgba(255, 255, 255, 0.07);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--page-bg);
      color: var(--text-bright);
      min-height: 100vh;
      overflow-x: hidden;
      overflow-y: auto;
    }
    
    /* Background Orbs */
    .bg-orbs {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: float 20s infinite alternate ease-in-out;
    }
    .orb-1 {
      width: 400px; height: 400px;
      background: var(--emerald);
      top: -100px; left: -100px;
    }
    .orb-2 {
      width: 500px; height: 500px;
      background: var(--accent-cyan);
      bottom: -200px; right: -100px;
      animation-delay: -5s;
    }
    .orb-3 {
      width: 300px; height: 300px;
      background: var(--gold);
      top: 40%; left: 40%;
      opacity: 0.15;
      animation-delay: -10s;
    }
    
    @keyframes float {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(50px, 50px) scale(1.1); }
    }
    
    /* Layout */
    .layout-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      min-height: 100vh;
    }
    
    /* Left: Showcase */
    .showcase {
      flex: 1;
      display: none; /* Hidden on mobile */
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      border-right: 1px solid var(--border-glass);
      background: linear-gradient(135deg, rgba(13,17,23,0.85), rgba(24,27,32,0.7));
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    @media (min-width: 960px) {
      .showcase { display: flex; }
    }
    
    .mini-board-wrapper {
      perspective: 1000px;
      margin-bottom: 60px;
    }
    .mini-board {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      width: 320px;
      height: 320px;
      transform: rotateX(25deg) rotateY(-15deg) rotateZ(10deg);
      transform-style: preserve-3d;
      box-shadow: -20px 30px 60px rgba(0,0,0,0.8), 0 0 30px var(--emerald-glow);
      border: 4px solid #2a2e38;
      border-radius: 8px;
      background: #2a2e38;
      transition: transform 0.5s ease;
      animation: boardFloat 6s infinite ease-in-out;
    }
    .mini-board:hover {
      transform: rotateX(15deg) rotateY(-5deg) rotateZ(5deg) translateY(-10px);
    }
    @keyframes boardFloat {
      0%, 100% { transform: rotateX(25deg) rotateY(-15deg) rotateZ(10deg) translateY(0); }
      50% { transform: rotateX(25deg) rotateY(-15deg) rotateZ(10deg) translateY(-15px); }
    }
    
    .cell {
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    .cell.dark { background: rgba(31,34,41,0.9); }
    .cell.light { background: rgba(51,55,66,0.9); }
    .cell img {
      width: 70%;
      height: 70%;
      object-fit: contain;
      filter: drop-shadow(0 8px 6px rgba(0,0,0,0.6));
      transform: translateY(-5px);
    }
    
    .feature-ticker {
      width: 100%;
      max-width: 400px;
      height: 60px;
      overflow: hidden;
      position: relative;
      border-radius: 12px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border-glass);
    }
    .ticker-content {
      display: flex;
      flex-direction: column;
      animation: tickText 12s infinite;
    }
    .ticker-item {
      height: 60px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 20px;
      font-size: 15px;
      font-weight: 500;
      color: var(--text-bright);
      text-align: center;
    }
    .ticker-item span { color: var(--accent-cyan); font-weight: 700; margin-right: 8px; }
    
    @keyframes tickText {
      0%, 20% { transform: translateY(0); }
      25%, 45% { transform: translateY(-60px); }
      50%, 70% { transform: translateY(-120px); }
      75%, 95% { transform: translateY(-180px); }
      100% { transform: translateY(0); }
    }
    
    /* Right: Form */
    .form-section {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: transparent;
    }
    
    .auth-card {
      width: 100%;
      max-width: 420px;
      background: var(--glass-surface);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 40px;
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .auth-logo {
      text-align: center;
      margin-bottom: 120px;
    }
    .auth-logo img {
      max-height: 100px;
      object-fit: contain;
    }
    
    .auth-card h1 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 8px;
      text-align: center;
      letter-spacing: -0.5px;
    }
    .auth-card .subtitle {
      text-align: center;
      font-size: 15px;
      color: var(--text-dim);
      margin-bottom: 32px;
    }
    
    /* Error Msg */
    .error-msg {
      background: rgba(248,81,73,0.1);
      border: 1px solid rgba(248,81,73,0.3);
      border-radius: 12px;
      padding: 12px 16px;
      color: var(--red-soft);
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 10px;
      transform-origin: top;
      animation: errorShake 0.4s ease, dropdown 0.3s ease;
    }
    .error-msg.show {
      display: flex;
    }
    .error-msg svg {
      width: 20px; height: 20px;
      fill: none; stroke: currentColor; stroke-width: 2;
      flex-shrink: 0;
    }
    @keyframes dropdown {
      from { opacity: 0; transform: scaleY(0.8); }
      to { opacity: 1; transform: scaleY(1); }
    }
    @keyframes errorShake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }
    
    /* Form Elements */
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      margin-bottom: 8px;
      transition: color 0.2s;
    }
    .input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrapper .icon {
      position: absolute;
      left: 14px;
      width: 20px; height: 20px;
      color: var(--text-muted);
      transition: color 0.3s;
      fill: none; stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
      pointer-events: none;
    }
    .input-wrapper input {
      width: 100%;
      padding: 14px 14px 14px 44px;
      background: rgba(0,0,0,0.2);
      border: 1px solid var(--border-glass);
      border-radius: 12px;
      color: var(--text-bright);
      font-size: 15px;
      font-family: inherit;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .input-wrapper input:focus {
      outline: none;
      border-color: var(--emerald);
      background: rgba(0,0,0,0.4);
      box-shadow: 0 0 0 4px var(--emerald-glow);
    }
    .input-wrapper input:focus + .icon,
    .input-wrapper input:focus ~ .icon {
      color: var(--emerald);
    }
    .input-wrapper input::placeholder {
      color: var(--text-muted);
    }
    
    .btn-toggle-pass {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
    }
    .btn-toggle-pass:hover {
      color: var(--text-bright);
      background: rgba(255,255,255,0.1);
    }
    .btn-toggle-pass svg {
      width: 20px; height: 20px;
      fill: none; stroke: currentColor; stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }
    
    .btn-submit {
      width: 100%;
      padding: 16px;
      background: var(--emerald);
      color: #000;
      border: none;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 12px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s ease;
      overflow: hidden;
    }
    .btn-submit:hover:not(:disabled) {
      box-shadow: 0 8px 24px var(--emerald-glow);
      transform: translateY(-2px);
      background: #4ade80;
    }
    .btn-submit:active:not(:disabled) {
      transform: translateY(0);
    }
    .btn-submit:disabled {
      background: var(--surface2);
      color: var(--text-dim);
      cursor: not-allowed;
      border: 1px solid var(--border-glass);
      box-shadow: none;
      transform: none;
    }
    .btn-text {
      transition: opacity 0.2s;
    }
    .spinner {
      position: absolute;
      width: 24px;
      height: 24px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      opacity: 0;
      visibility: hidden;
      transition: opacity 0.2s;
    }
    .btn-submit.loading .btn-text { opacity: 0; }
    .btn-submit.loading .spinner { opacity: 1; visibility: visible; }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    .switch-link {
      text-align: center;
      margin-top: 24px;
      font-size: 14px;
      color: var(--text-dim);
    }
    .switch-link a {
      color: var(--accent-cyan);
      text-decoration: none;
      font-weight: 600;
      transition: all 0.2s;
      padding: 4px 8px;
      border-radius: 6px;
    }
    .switch-link a:hover {
      color: #67e8f9;
      background: var(--cyan-glow);
    }
  </style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>

<div class="layout-wrapper">
  <!-- Left Column -->
  <div class="showcase">
    <div class="mini-board-wrapper">
      <div class="mini-board">
        <!-- Row 6 -->
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"><img src="img/pieces/bb.svg" alt="Black Bishop"></div>
        <div class="cell light"><img src="img/pieces/bn.svg" alt="Black Knight"></div>
        <div class="cell dark"><img src="img/pieces/br.svg" alt="Black Rook"></div>
        <div class="cell light"><img src="img/pieces/bk.svg" alt="Black King"></div>
        <!-- Row 5 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"><img src="img/pieces/bp.svg" alt="Black Pawn"></div>
        <!-- Row 4 -->
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <!-- Row 3 -->
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <!-- Row 2 -->
        <div class="cell dark"><img src="img/pieces/wp.svg" alt="White Pawn"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
        <div class="cell light"></div>
        <!-- Row 1 -->
        <div class="cell light"><img src="img/pieces/wk.svg" alt="White King"></div>
        <div class="cell dark"><img src="img/pieces/wr.svg" alt="White Rook"></div>
        <div class="cell light"><img src="img/pieces/wn.svg" alt="White Knight"></div>
        <div class="cell dark"><img src="img/pieces/wb.svg" alt="White Bishop"></div>
        <div class="cell light"></div>
        <div class="cell dark"></div>
      </div>
    </div>
    
    <div class="feature-ticker">
      <div class="ticker-content">
        <div class="ticker-item"><span>⚔️</span> Fast-paced Minichess Duels</div>
        <div class="ticker-item"><span>🏆</span> Climb the Global Leaderboards</div>
        <div class="ticker-item"><span>🤖</span> Challenge Advanced Bots</div>
        <div class="ticker-item"><span>🎒</span> Unlock Premium Customizations</div>
      </div>
    </div>
  </div>

  <!-- Right Column -->
  <div class="form-section">
    <div class="auth-card">
      <div class="auth-logo">
        <img src="img/logo.png" alt="MiniChess" onerror="this.style.display='none'">
      </div>
      <h1>Create Account</h1>
      <p class="subtitle">Join the MiniChess community</p>
      
      <div id="error" class="error-msg">
        <svg viewBox="0 0 24 24">
          <path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path>
          <line x1="12" y1="9" x2="12" y2="13"></line>
          <line x1="12" y1="17" x2="12.01" y2="17"></line>
        </svg>
        <span id="errorText"></span>
      </div>
      
      <form id="registerForm">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrapper">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
            <input type="text" id="username" name="username" placeholder="Choose a username" required minlength="3" maxlength="20" autocomplete="username">
          </div>
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrapper">
            <svg class="icon" viewBox="0 0 24 24">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
              <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
            <input type="password" id="password" name="password" placeholder="Choose a password" required minlength="4" autocomplete="new-password">
            <button type="button" class="btn-toggle-pass" id="togglePass" tabindex="-1" aria-label="Toggle Password Visibility">
              <svg viewBox="0 0 24 24" class="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <div class="input-wrapper">
            <svg class="icon" viewBox="0 0 24 24">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path>
            </svg>
            <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required minlength="4" autocomplete="new-password">
            <button type="button" class="btn-toggle-pass" id="toggleConfirmPass" tabindex="-1" aria-label="Toggle Password Visibility">
              <svg viewBox="0 0 24 24" class="eye-icon">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                <circle cx="12" cy="12" r="3"></circle>
              </svg>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn-submit" id="submitBtn">
          <span class="btn-text">Register Account</span>
          <div class="spinner"></div>
        </button>
      </form>
      <p class="switch-link">Already have an account? <a href="index.html">Log In</a></p>
    </div>
  </div>
</div>

<script src="js/auth.js"></script>
<script>
  // Password Visibility Toggle Logic
  function setupPasswordToggle(toggleBtnId, inputId) {
    const btn = document.getElementById(toggleBtnId);
    const input = document.getElementById(inputId);
    
    btn.addEventListener('click', () => {
      const type = input.getAttribute('type') === 'password' ? 'text' : 'password';
      input.setAttribute('type', type);
      
      if (type === 'text') {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" class="eye-icon">
            <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
            <line x1="1" y1="1" x2="23" y2="23"></line>
          </svg>
        `;
      } else {
        btn.innerHTML = `
          <svg viewBox="0 0 24 24" class="eye-icon">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
            <circle cx="12" cy="12" r="3"></circle>
          </svg>
        `;
      }
    });
  }

  setupPasswordToggle('togglePass', 'password');
  setupPasswordToggle('toggleConfirmPass', 'confirmPassword');

  // Register Form Submission
  const registerForm = document.getElementById('registerForm');
  const submitBtn = document.getElementById('submitBtn');
  const errorEl = document.getElementById('error');
  const errorText = document.getElementById('errorText');

  registerForm.addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Hide error
    errorEl.classList.remove('show');
    
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirmPassword').value;

    if (password !== confirmPassword) {
      showError('Passwords do not match');
      return;
    }

    // Set loading state
    submitBtn.classList.add('loading');
    submitBtn.disabled = true;
    document.getElementById('username').disabled = true;
    document.getElementById('password').disabled = true;
    document.getElementById('confirmPassword').disabled = true;
    document.getElementById('togglePass').disabled = true;
    document.getElementById('toggleConfirmPass').disabled = true;

    try {
      const result = await register(username, password);

      if (result.success) {
        window.location.href = 'lobby.html';
      } else {
        showError(result.message);
      }
    } catch (err) {
      showError('Failed to connect to server.');
    }
  });

  function showError(msg) {
    // Reset state
    submitBtn.classList.remove('loading');
    submitBtn.disabled = false;
    document.getElementById('username').disabled = false;
    document.getElementById('password').disabled = false;
    document.getElementById('confirmPassword').disabled = false;
    document.getElementById('togglePass').disabled = false;
    document.getElementById('toggleConfirmPass').disabled = false;
    
    // Show error with reflow for animation restart
    errorEl.classList.remove('show');
    void errorEl.offsetWidth; // trigger reflow
    errorText.textContent = msg;
    errorEl.classList.add('show');
  }
</script>
</body>
</html>
