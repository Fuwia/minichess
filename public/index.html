<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChess - Login</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo">♟ Mini<span>Chess</span></div>
    <div class="nav-links">
      <a href="leaderboard.html">Leaderboard</a>
    </div>
  </nav>

  <div class="auth-container">
    <div class="auth-card">
      <h1>Welcome Back</h1>
      <p class="subtitle">Log in to play MiniChess</p>
      <div id="error" class="error-msg" style="display: none;"></div>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Your username" required minlength="3" maxlength="20">
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Your password" required minlength="4">
        </div>
        <button type="submit" class="btn-primary">Log In</button>
      </form>
      <p class="switch-link">Don't have an account? <a href="register.html">Register</a></p>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const errorEl = document.getElementById('error');
      errorEl.style.display = 'none';

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      const result = await login(username, password);

      if (result.success) {
        const redirect = sessionStorage.getItem('redirectAfterLogin');
        if (redirect) {
          sessionStorage.removeItem('redirectAfterLogin');
          window.location.href = redirect;
        } else {
          window.location.href = 'lobby.html';
        }
      } else {
        errorEl.textContent = result.message;
        errorEl.style.display = 'block';
      }
    });
  </script>
</body>
</html>
