<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChess - Game</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo">♟ Mini<span>Chess</span></div>
    <div class="nav-links" id="navLinks">
      <a href="lobby.html" style="font-size:14px; color: var(--text-secondary); text-decoration: none;">Play</a>
      <a href="profile.html" style="font-size:14px; color: var(--text-secondary); text-decoration: none;">Profile</a>
      <!-- Live-mode controls (hidden in replay) -->
      <span id="liveControls">
        <button id="drawBtn" class="secondary" onclick="toggleDraw()">Draw</button>
        <button class="secondary" onclick="resignGame()">Resign</button>
        <button class="secondary" onclick="window.location.href='lobby.html'">Leave</button>
      </span>
    </div>
  </nav>

  <!-- Replay badge (only visible in replay mode) -->
  <div id="replayBanner" class="replay-banner" style="display:none;">
    <span>📋 Replay</span>
    <span id="replayResult"></span>
  </div>

  <div class="game-container">
    <div class="board-wrapper">
      <!-- Opponent pocket strip -->
      <div class="pocket-strip">
        <span class="pocket-strip-label">Opponent's Pocket</span>
        <div class="pocket-strip-pieces" id="opponentPocket"></div>
      </div>

      <!-- Opponent info -->
      <div class="board-header">
        <div class="player-info">
          <span class="player-color" id="opponentColorDot"></span>
          <span class="player-name" id="opponentName">Opponent</span>
          <span class="player-elo" id="opponentElo">1200</span>
        </div>
        <div class="clock" id="opponentClock">2:00</div>
        <div class="turn-indicator" id="turnIndicator">...</div>
      </div>

      <!-- Dice display (hidden in standard mode) -->
      <div class="dice-display" id="diceDisplay" style="display:none;">
        <div class="dice-icon">🎲</div>
        <div class="dice-info">Roll: <span id="diceRollNum">-</span> — <span id="dicePieceName">-</span></div>
        <button id="skipBtn" class="btn-skip" style="display:none;" onclick="skipDiceTurn()">Skip Turn</button>
      </div>

      <!-- Chess board -->
      <div class="chess-board" id="chessBoard"></div>

      <!-- File labels -->
      <div class="file-labels" id="fileLabels"></div>

      <!-- Player info -->
      <div class="board-header">
        <div class="player-info">
          <span class="player-color" id="playerColorDot"></span>
          <span class="player-name" id="playerName">You</span>
          <span class="player-elo" id="playerElo">1200</span>
        </div>
        <div class="clock" id="playerClock">2:00</div>
      </div>

      <!-- Player pocket strip -->
      <div class="pocket-strip your-pocket">
        <span class="pocket-strip-label">Your Pocket</span>
        <div class="pocket-strip-pieces" id="playerPocket"></div>
      </div>

      <!-- Move History strip -->
      <div class="moves-strip">
        <span class="moves-strip-label">Moves</span>
        <div class="move-history" id="moveHistory">
          <span class="moves-placeholder">Game starting...</span>
        </div>
      </div>
    </div>
  </div>

  <!-- Promotion dialog (hidden) -->
  <div class="promotion-dialog" id="promotionDialog" style="display: none;"></div>

  <!-- Game Over overlay (hidden) -->
  <div class="game-over-overlay" id="gameOverOverlay" style="display: none;">
    <div class="game-over-card" id="gameOverCard"></div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/socket.js"></script>
  <script src="js/engine.js"></script>
  <script src="js/sound.js"></script>
  <script src="js/board.js"></script>
  <script>
    let gameId = null;
    let myColor = null;
    let boardState = null;
    let pockets = { white: [], black: [] };
    let activeColor = 'white';
    let moveHistory = [];
    let selectedSquare = null;
    let selectedPocketPiece = null;
    let possibleMoves = [];
    let gameOver = false;
    let promotionPending = null;
    let dragFromRow = null;
    let dragFromCol = null;
    let dragPocketType = null;
    let lastServerWhiteTime = 120000;
    let lastServerBlackTime = 120000;
    let lastTimestamp = Date.now();
    let clockInterval = null;
    let drawOffered = false;
    let gameMode = 'standard';
    let currentDice = null; // { roll, pieceType, pieceName }
    let isReplay = false;

    // ==================== Determine Mode ====================

    function getMatchIdFromUrl() {
      const params = new URLSearchParams(window.location.search);
      return params.get('matchId') || null;
    }

    async function init() {
      const user = await getCurrentUser();
      if (!user) {
        window.location.href = 'index.html';
        return;
      }

      const matchId = getMatchIdFromUrl();

      if (matchId) {
        // Check the game status from the server — is it active or finished?
        try {
          const res = await fetch('/api/games/' + encodeURIComponent(matchId));
          const data = await res.json();

          if (data.success && data.status === 'active') {
            // Game is still in progress — join as live mode
            isReplay = false;
            gameId = matchId;
            myColor = null;
            boardState = null;
            initSocket();
            setupLiveSocket(user, matchId);
            // Live socket will send 'game_state' event with full state
            // Render an empty board while waiting
            boardState = { board: Array.from({ length: 6 }, () => Array(6).fill(null)), activeColor: 'white', pockets: { white: [], black: [] } };
            pockets = boardState.pockets;
            activeColor = boardState.activeColor;
            renderBoard();
            setupMoveLabels();
            return;
          }

          if (data.success && data.status === 'finished') {
            // Game is over — show replay
            await initWithGameData(matchId, user, data.game);
            return;
          }
        } catch (err) {
          console.error('Failed to check game status:', err);
        }

        // Fallback: try sessionStorage (old flow for games started this session)
        const gameDataStr = sessionStorage.getItem('gameData');
        if (gameDataStr) {
          const gameData = JSON.parse(gameDataStr);
          if (gameData.gameId === matchId) {
            await initLive(user);
            return;
          }
        }

        // If nothing matched, try replay as last resort
        await initReplay(matchId, user);
      } else {
        // Live mode: read from sessionStorage (existing flow)
        await initLive(user);
      }
    }

    // Helper to render a finished game from pre-fetched data (avoids second API call)
    async function initWithGameData(matchId, user, game) {
      isReplay = true;
      gameId = matchId;

      // Hide live-only controls
      const liveControls = document.getElementById('liveControls');
      if (liveControls) liveControls.style.display = 'none';
      gameOver = true;

      // Determine color
      if (user.id === game.white.id) {
        myColor = 'white';
      } else {
        myColor = 'black';
      }

      const opponentColor = myColor === 'white' ? 'black' : 'white';
      const opponent = game[opponentColor] || {};

      document.getElementById('playerName').textContent = (user.username || 'You') + ' (You)';
      document.getElementById('playerElo').textContent = (game[myColor] && game[myColor].elo) || '1200';
      document.getElementById('opponentName').textContent = (opponent.username || 'Opponent');
      document.getElementById('opponentElo').textContent = opponent.elo || '1200';
      document.getElementById('playerColorDot').className = 'player-color ' + myColor;
      document.getElementById('opponentColorDot').className = 'player-color ' + opponentColor;

      if (game.fen) {
        boardState = parseFen(game.fen);
        if (boardState) {
          pockets = boardState.pockets;
          activeColor = boardState.activeColor;
        }
      } else {
        boardState = { board: Array.from({ length: 6 }, () => Array(6).fill(null)), activeColor: 'white', pockets: { white: [], black: [] } };
        pockets = boardState.pockets;
      }

      if (game.moves && Array.isArray(game.moves)) {
        moveHistory = [];
        for (let i = 0; i < game.moves.length; i += 2) {
          moveHistory.push({
            white: game.moves[i] ? formatMoveInline(game.moves[i]) : null,
            black: game.moves[i + 1] ? formatMoveInline(game.moves[i + 1]) : null
          });
        }
      }

      renderReplayResult(game.result);
      showBanner('Replay', 'info');
      renderBoard();
      updatePockets();
      updateTurnIndicator();
      setupMoveLabels();
      updateMoveHistory();
      document.getElementById('playerClock').textContent = '—';
      document.getElementById('opponentClock').textContent = '—';
      document.getElementById('turnIndicator').textContent = 'Finished';
      document.getElementById('playerClock').classList.remove('active-clock', 'low-time');
      document.getElementById('opponentClock').classList.remove('active-clock', 'low-time');
      showReplayOverlay(game.result);
    }

    // ==================== Replay Mode ====================

    async function initReplay(matchId, user) {
      isReplay = true;
      gameId = matchId;

      // Hide live-only controls
      const liveControls = document.getElementById('liveControls');
      if (liveControls) liveControls.style.display = 'none';

      // Disable all interactive board
      gameOver = true;

      try {
        const res = await fetch('/api/games/' + encodeURIComponent(matchId));
        const data = await res.json();

        if (!data.success || !data.game) {
          showBanner('Game not found', 'error');
          document.getElementById('playerName').textContent = user.username;
          document.getElementById('opponentName').textContent = '—';
          renderEmptyBoard();
          return;
        }

        const game = data.game;

        // Determine which color the current user played
        const playerWhiteId = game.white && game.white.id;
        if (user.id === playerWhiteId) {
          myColor = 'white';
        } else {
          myColor = 'black';
        }

        const opponentColor = myColor === 'white' ? 'black' : 'white';
        const opponent = game[opponentColor] || {};

        document.getElementById('playerName').textContent = (user.username || 'You') + ' (You)';
        document.getElementById('playerElo').textContent = (game[myColor] && game[myColor].elo) || '1200';
        document.getElementById('opponentName').textContent = (opponent.username || 'Opponent');
        document.getElementById('opponentElo').textContent = opponent.elo || '1200';

        // Color dots
        document.getElementById('playerColorDot').className = 'player-color ' + myColor;
        document.getElementById('opponentColorDot').className = 'player-color ' + opponentColor;

        // Parse final FEN
        if (game.fen) {
          boardState = parseFen(game.fen);
          if (boardState) {
            pockets = boardState.pockets;
            activeColor = boardState.activeColor;
          }
        } else {
          boardState = { board: Array.from({ length: 6 }, () => Array(6).fill(null)), activeColor: 'white', pockets: { white: [], black: [] } };
          pockets = boardState.pockets;
          activeColor = boardState.activeColor;
        }

        // Parse moves for history display
        if (game.moves && Array.isArray(game.moves)) {
          moveHistory = [];
          for (let i = 0; i < game.moves.length; i += 2) {
            const whiteMove = game.moves[i] || null;
            const blackMove = game.moves[i + 1] || null;
            moveHistory.push({
              white: whiteMove ? formatMoveInline(whiteMove) : null,
              black: blackMove ? formatMoveInline(blackMove) : null
            });
          }
        }

        // Show result
        renderReplayResult(game.result);
        showBanner('Replay', 'info');

        // Render
        renderBoard();
        updatePockets();
        updateTurnIndicator();
        setupMoveLabels();
        updateMoveHistory();

        // Clocks frozen at 0:00 for replay
        document.getElementById('playerClock').textContent = '—';
        document.getElementById('opponentClock').textContent = '—';
        document.getElementById('turnIndicator').textContent = 'Finished';

        // Disable clocks
        document.getElementById('playerClock').classList.remove('active-clock', 'low-time');
        document.getElementById('opponentClock').classList.remove('active-clock', 'low-time');

        // Show game over overlay
        showReplayOverlay(game.result);

      } catch (err) {
        console.error('Failed to load replay:', err);
        showBanner('Failed to load game', 'error');
        document.getElementById('playerName').textContent = user.username;
        document.getElementById('opponentName').textContent = '—';
        renderEmptyBoard();
      }
    }

    function renderReplayResult(serverResult) {
      // serverResult: 'white_wins', 'black_wins', or 'draw'
      let playerResultText = '';
      let resultClass = '';

      if (serverResult === 'draw') {
        playerResultText = 'Draw';
        resultClass = 'draw-text';
      } else if (serverResult === 'white_wins') {
        if (myColor === 'white') {
          playerResultText = 'You Won';
          resultClass = 'win-text';
        } else {
          playerResultText = 'You Lost';
          resultClass = 'lose-text';
        }
      } else if (serverResult === 'black_wins') {
        if (myColor === 'black') {
          playerResultText = 'You Won';
          resultClass = 'win-text';
        } else {
          playerResultText = 'You Lost';
          resultClass = 'lose-text';
        }
      }

      const banner = document.getElementById('replayResult');
      banner.textContent = playerResultText;
      banner.className = resultClass;
    }

    function showReplayOverlay(serverResult) {
      const overlay = document.getElementById('gameOverOverlay');
      const card = document.getElementById('gameOverCard');

      let titleText = '';
      let titleClass = '';

      if (serverResult === 'draw') {
        titleText = 'Draw';
        titleClass = 'draw-text';
      } else if (serverResult === 'white_wins') {
        titleText = myColor === 'white' ? 'You Win!' : 'You Lose';
        titleClass = myColor === 'white' ? 'win-text' : 'lose-text';
      } else if (serverResult === 'black_wins') {
        titleText = myColor === 'black' ? 'You Win!' : 'You Lose';
        titleClass = myColor === 'black' ? 'win-text' : 'lose-text';
      }

      card.innerHTML = `
        <h2 class="${titleClass}">${titleText}</h2>
        <p class="elo-change">Replay — ${serverResult.replace('_', ' ')}</p>
        <button onclick="window.location.href='lobby.html'">Back to Lobby</button>
      `;
      overlay.style.display = 'flex';
    }

    function showBanner(text, type) {
      const banner = document.getElementById('replayBanner');
      banner.style.display = 'flex';
      const span = banner.querySelector('span:first-child');
      span.textContent = type === 'error' ? '⚠ ' + text : '📋 ' + text;
      span.className = '';
    }

    function renderEmptyBoard() {
      const boardEl = document.getElementById('chessBoard');
      boardEl.innerHTML = '';
      for (let ri = 0; ri < 6; ri++) {
        for (let ci = 0; ci < 6; ci++) {
          const square = document.createElement('div');
          square.className = 'square ' + ((ri + ci) % 2 === 0 ? 'light' : 'dark');
          boardEl.appendChild(square);
        }
      }
      document.getElementById('playerPocket').innerHTML = '';
      document.getElementById('opponentPocket').innerHTML = '';
      document.getElementById('moveHistory').innerHTML = '<div style="color: var(--text-secondary);">No data</div>';
    }

    function formatMoveInline(move) {
      if (!move) return '';
      if (move.isDrop) {
        return '@' + (move.to || '') + (move.pieceType ? move.pieceType.toUpperCase() : '');
      }
      let notation = '';
      if (move.pieceType) notation += move.pieceType.toUpperCase();
      if (move.captured) notation += 'x';
      notation += (move.to || '');
      if (move.promotion) notation += '=' + move.promotion.toUpperCase();
      return notation;
    }

    // ==================== Live Mode ====================

    async function initLive(user) {
      isReplay = false;

      // Get game data from session storage
      const gameDataStr = sessionStorage.getItem('gameData');
      if (!gameDataStr) {
        // Check if we have a matchId from URL — if so, try it as reconnect to active game
        const matchId = getMatchIdFromUrl();
        if (matchId) {
          initSocket();
          // Will attempt reconnect — if game not active, we get an error
          setupLiveSocket(user, matchId);
          return;
        }
        window.location.href = 'lobby.html';
        return;
      }

      const gameData = JSON.parse(gameDataStr);
      gameId = gameData.gameId;
      myColor = gameData.color;

      // Update browser URL to include matchId for refreshability
      if (gameId && !getMatchIdFromUrl()) {
        history.replaceState(null, '', 'game.html?matchId=' + encodeURIComponent(gameId));
      }

      document.getElementById('playerName').textContent = user.username + ' (You)';
      document.getElementById('playerElo').textContent = user.elo;
      document.getElementById('opponentName').textContent = gameData.opponent.username;
      document.getElementById('opponentElo').textContent = gameData.opponent.elo;

      // Set color dots
      document.getElementById('playerColorDot').className = 'player-color ' + myColor;
      const opponentColor = myColor === 'white' ? 'black' : 'white';
      document.getElementById('opponentColorDot').className = 'player-color ' + opponentColor;

      // Parse initial FEN
      const fen = gameData.fen;
      boardState = parseFen(fen);
      activeColor = boardState.activeColor;
      pockets = boardState.pockets;

      initSocket();
      setupLiveSocket(user, gameId);

      // Render board
      renderBoard();
      updatePockets();
      updateTurnIndicator();
      setupMoveLabels();

      // Dice mode
      gameMode = gameData.mode || 'standard';
      if (gameMode === 'dice') {
        document.getElementById('diceDisplay').style.display = 'flex';
        document.getElementById('skipBtn').style.display = 'inline-block';
      }
    }

    function setupLiveSocket(user, gId) {
      const effectiveGameId = gId || gameId;

      // Register socket with the game
      socket.on('connect', () => {
        if (effectiveGameId) {
          socket.emit('reconnect_game', { gameId: effectiveGameId });
        }
      });

      // If socket already connected, emit immediately
      if (socket && socket.connected && effectiveGameId) {
        socket.emit('reconnect_game', { gameId: effectiveGameId });
      }

      // Handle reconnection: server sends full game state
      socket.on('game_state', (data) => {
        gameId = effectiveGameId;
        myColor = data.color;
        isReplay = false;
        gameOver = false;

        // Update URL
        if (!getMatchIdFromUrl()) {
          history.replaceState(null, '', 'game.html?matchId=' + encodeURIComponent(effectiveGameId));
        }

        const boardData = parseFen(data.fen);
        if (boardData) {
          boardState = boardData;
          activeColor = boardData.activeColor;
          pockets = boardData.pockets;
        }

        document.getElementById('playerName').textContent = user.username + ' (You)';
        document.getElementById('playerElo').textContent = user.elo;
        document.getElementById('opponentName').textContent = data.opponent.username;
        document.getElementById('opponentElo').textContent = data.opponent.elo;

        const opponentColor = myColor === 'white' ? 'black' : 'white';
        document.getElementById('playerColorDot').className = 'player-color ' + myColor;
        document.getElementById('opponentColorDot').className = 'player-color ' + opponentColor;

        gameMode = data.mode || 'standard';
        if (gameMode === 'dice') {
          document.getElementById('diceDisplay').style.display = 'flex';
          document.getElementById('skipBtn').style.display = 'inline-block';
        }

        // Show live controls
        const liveControls = document.getElementById('liveControls');
        if (liveControls) liveControls.style.display = '';

        renderBoard();
        updatePockets();
        updateTurnIndicator();
        setupMoveLabels();
        updateMoveHistory();

        // Reset clock sync
        lastServerWhiteTime = data.whiteTime || 120000;
        lastServerBlackTime = data.blackTime || 120000;
        lastTimestamp = Date.now();
        if (clockInterval) clearInterval(clockInterval);
        clockInterval = setInterval(tickClock, 200);
        tickClock();

        selectedSquare = null;
        selectedPocketPiece = null;
        possibleMoves = [];
        moveHistory = [];
      });

      // Move result
      socket.on('move_result', (data) => {
        animateMove(data.move, () => {
          boardState = parseFen(data.fen);
          activeColor = data.activeColor;
          pockets = data.pockets;
          moveHistory.push({
            white: data.activeColor === 'black' ? formatMove(data.move) : null,
            black: data.activeColor === 'white' ? formatMove(data.move) : null,
          });

          selectedSquare = null;
          selectedPocketPiece = null;
          possibleMoves = [];
          promotionPending = null;

          renderBoard();
          updatePockets();
          updateTurnIndicator();
          updateMoveHistory();
          syncServerTime(data.whiteTime, data.blackTime);
        });

        // Sound effects
        if (data.move.isDrop) {
          SoundManager.play('drop');
        } else if (data.move.captured) {
          SoundManager.play('capture');
        } else {
          SoundManager.play('move');
        }
        if (data.isCheck) {
          SoundManager.play('check');
          showToast('Check!', 'info');
        }
      });

      // Game over
      socket.on('game_over', (data) => {
        gameOver = true;
        SoundManager.play('gameover');
        showGameOver(data.result);
      });

      socket.on('opponent_disconnected', (data) => {
        // Don't end the game — the server gives the opponent 20s to reconnect.
        // Only show a notice. The actual game_over event will fire if they don't return.
        showToast(data.message, 'info');
      });

      socket.on('opponent_reconnected', (data) => {
        showToast(data.message, 'success');
      });

      socket.on('error', (data) => {
        showToast(data.message, 'error');
      });

      // Draw offer events
      socket.on('draw_offered', (data) => {
        showToast('Opponent offers a draw', 'info', [
          { label: 'Accept', action: () => { socket.emit('accept_draw', { gameId: gameId }); } },
          { label: 'Decline', action: () => { socket.emit('decline_draw', { gameId: gameId }); } }
        ]);
      });

      socket.on('draw_declined', () => {
        drawOffered = false;
        const btn = document.getElementById('drawBtn');
        if (btn) btn.textContent = 'Draw';
        showToast('Draw offer declined', 'info');
      });

      socket.on('draw_cancelled', () => {
        showToast('Draw offer cancelled by opponent', 'info');
      });

      socket.on('draw_requested', () => {
        // Our offer was sent
      });

      // Dice events
      socket.on('dice_roll', (data) => {
        currentDice = data;
        document.getElementById('diceRollNum').textContent = data.roll;
        document.getElementById('dicePieceName').textContent = data.pieceName;
        if (activeColor === myColor && !gameOver) {
          showToast(`🎲 Rolled ${data.roll} — must move a ${data.pieceName}`, 'info');
        }
      });

      socket.on('dice_skip_result', (data) => {
        if (data.skipped) {
          showToast(`${data.skippedBy} had no valid moves — skipped`, 'info');
        }
      });
    }

    // ==================== Shared Rendering ====================

    function skipDiceTurn() {
      if (gameOver || gameMode !== 'dice' || isReplay) return;
      socket.emit('dice_skip', { gameId: gameId });
    }

    function renderBoard() {
      const boardEl = document.getElementById('chessBoard');
      boardEl.innerHTML = '';

      // Calculate last move squares
      let lastMoveFrom = null, lastMoveTo = null;
      if (boardState && boardState.lastMove) {
        lastMoveFrom = boardState.lastMove.from;
        lastMoveTo = boardState.lastMove.to;
      }

      // White sees row 5→0 (top-down), Black sees row 0→5 (reversed)
      const isWhitePerspective = myColor === 'white';
      for (let ri = 0; ri < 6; ri++) {
        const row = isWhitePerspective ? 5 - ri : ri;
        for (let ci = 0; ci < 6; ci++) {
          const col = isWhitePerspective ? ci : 5 - ci;
          const square = document.createElement('div');
          const isLight = (row + col) % 2 === 0;
          square.className = 'square ' + (isLight ? 'light' : 'dark');
          square.dataset.row = row;
          square.dataset.col = col;

          const piece = boardState && boardState.board[row] ? boardState.board[row][col] : null;
          if (piece) {
            square.innerHTML = getPieceSymbol(piece);
          }

          const sqName = coordsToSquare(row, col);

          // Drag support: only own pieces on your turn, and not in replay
          const canDrag = !gameOver && !isReplay && piece && piece.color === myColor && myColor === activeColor;
          if (canDrag) {
            square.draggable = true;
            square.addEventListener('dragstart', (e) => onDragStart(e, row, col));
          }
          // Drop target support (only if not replay)
          if (!isReplay) {
            square.addEventListener('dragover', onDragOver);
            square.addEventListener('dragenter', (e) => onDragEnter(e, row, col));
            square.addEventListener('dragleave', (e) => onDragLeave(e, row, col));
            square.addEventListener('drop', (e) => onDrop(e, row, col));
          }

          // Highlight selected square
          if (selectedSquare && selectedSquare.row === row && selectedSquare.col === col) {
            square.classList.add('selected');
          }

          // Mark possible moves
          if (possibleMoves.some(m => m.to === sqName)) {
            const move = possibleMoves.find(m => m.to === sqName);
            if (boardState && boardState.board[row][col] !== null || (move && move.isEnPassant)) {
              square.classList.add('possible-capture');
            } else {
              square.classList.add('possible-move');
            }
          }

          // Last move highlight
          if (lastMoveFrom === sqName || lastMoveTo === sqName) {
            square.classList.add('last-move');
          }

          // King in check
          if (boardState && boardState.isCheck) {
            const king = findKing(boardState, activeColor);
            if (king && king.row === row && king.col === col) {
              square.classList.add('in-check');
            }
          }

          if (!isReplay) {
            square.addEventListener('click', () => onSquareClick(row, col));
          }
          boardEl.appendChild(square);
        }
      }
    }

    function onSquareClick(row, col) {
      if (gameOver || isReplay) return;
      
      const sqName = coordsToSquare(row, col);
      const piece = boardState.board[row][col];

      // If a pocket piece is selected for dropping
      if (selectedPocketPiece) {
        if (piece !== null) {
          showToast('Can only drop on empty squares', 'error');
          return;
        }

        sendDropMove(sqName);
        selectedPocketPiece = null;
        document.querySelectorAll('.pocket-piece.selected-drop').forEach(el => el.classList.remove('selected-drop'));
        return;
      }

      // If clicking on a possible move target
      if (possibleMoves.some(m => m.to === sqName)) {
        const move = possibleMoves.find(m => m.to === sqName);
        
        if (move.promotion) {
          showPromotionDialog(move);
          return;
        }

        sendMove(selectedSquare, { row, col }, null);
        return;
      }

      // Selecting one of your own pieces
      if (piece && piece.color === myColor) {
        if (gameMode === 'dice' && currentDice && piece.type !== currentDice.pieceType) {
          showToast(`Must move a ${currentDice.pieceName}`, 'error');
          return;
        }

        selectedSquare = { row, col };
        selectedPocketPiece = null;
        document.querySelectorAll('.pocket-piece.selected-drop').forEach(el => el.classList.remove('selected-drop'));
        possibleMoves = getLegalMoves(boardState, row, col);
        renderBoard();
        return;
      }

      // Clicking on opponent's piece or empty square without valid selection
      selectedSquare = null;
      possibleMoves = [];
      renderBoard();
    }

    function showPromotionDialog(move) {
      if (isReplay) return;
      promotionPending = move;
      const dialog = document.getElementById('promotionDialog');
      dialog.style.display = 'flex';

      const pieces = [
        { type: 'r', symbol: getPieceSymbolByType('r', myColor) },
        { type: 'b', symbol: getPieceSymbolByType('b', myColor) },
        { type: 'n', symbol: getPieceSymbolByType('n', myColor) }
      ];

      dialog.innerHTML = pieces.map(p => 
        `<div class="promo-option" data-type="${p.type}">${p.symbol}</div>`
      ).join('');

      dialog.querySelectorAll('.promo-option').forEach(el => {
        el.addEventListener('click', () => {
          const promoType = el.dataset.type;
          dialog.style.display = 'none';
          sendMove(
            squareToCoords(promotionPending.from),
            squareToCoords(promotionPending.to),
            promoType
          );
          promotionPending = null;
        });
      });
    }

    function sendMove(from, to, promotion) {
      if (isReplay) return;
      socket.emit('make_move', {
        gameId: gameId,
        move: {
          from: from ? coordsToSquare(from.row, from.col) : null,
          to: coordsToSquare(to.row, to.col),
          promotion: promotion,
          isDrop: false
        }
      });
    }

    function sendDropMove(toSquare) {
      if (isReplay) return;
      socket.emit('make_move', {
        gameId: gameId,
        move: {
          from: null,
          to: toSquare,
          pieceType: selectedPocketPiece,
          isDrop: true
        }
      });
    }

    function updatePockets() {
      // Player's pocket
      const playerPocket = document.getElementById('playerPocket');
      const myPocket = pockets[myColor] || [];
      if (myPocket.length === 0) {
        playerPocket.innerHTML = '';
      } else {
        playerPocket.innerHTML = myPocket.map((type, i) => {
          const symbol = getPieceSymbolByType(type, myColor);
          return `<div class="pocket-piece" data-index="${i}" data-type="${type}">${symbol}</div>`;
        }).join('');
      }

      // Opponent's pocket
      const opponentColor = myColor === 'white' ? 'black' : 'white';
      const opponentPocket = document.getElementById('opponentPocket');
      const oppPocket = pockets[opponentColor] || [];
      if (oppPocket.length === 0) {
        opponentPocket.innerHTML = '';
      } else {
        opponentPocket.innerHTML = oppPocket.map(type => {
          const symbol = getPieceSymbolByType(type, opponentColor);
          return `<div class="pocket-piece" style="pointer-events: none;">${symbol}</div>`;
        }).join('');
      }

      if (isReplay) return;

      // Add click and drag handlers for player's pocket pieces
      playerPocket.querySelectorAll('.pocket-piece').forEach(el => {
        const canDragPocket = !gameOver && myColor === activeColor;
        if (canDragPocket) {
          el.draggable = true;
          el.addEventListener('dragstart', (e) => onPocketDragStart(e, el.dataset.type));
          el.addEventListener('dragend', onPocketDragEnd);
        }

        el.addEventListener('click', (e) => {
          if (gameOver) return;
          if (myColor !== activeColor) {
            showToast('Not your turn', 'error');
            return;
          }

          const type = el.dataset.type;

          if (gameMode === 'dice' && currentDice && type !== currentDice.pieceType) {
            showToast(`Must drop a ${currentDice.pieceName}`, 'error');
            return;
          }

          if (selectedPocketPiece === type) {
            selectedPocketPiece = null;
            el.classList.remove('selected-drop');
            selectedSquare = null;
            possibleMoves = [];
            renderBoard();
          } else {
            selectedPocketPiece = type;
            selectedSquare = null;
            possibleMoves = [];
            document.querySelectorAll('.pocket-piece.selected-drop').forEach(p => p.classList.remove('selected-drop'));
            el.classList.add('selected-drop');
            renderBoard();
          }
        });
      });
    }

    function updateTurnIndicator() {
      const indicator = document.getElementById('turnIndicator');
      if (isReplay) {
        indicator.textContent = 'Finished';
        indicator.classList.remove('active');
        return;
      }
      if (activeColor === myColor) {
        indicator.textContent = 'Your Turn';
        indicator.classList.add('active');
      } else {
        indicator.textContent = 'Opponent\'s Turn';
        indicator.classList.remove('active');
      }
    }

    function updateMoveHistory() {
      const historyEl = document.getElementById('moveHistory');
      if (moveHistory.length === 0) {
        historyEl.innerHTML = '<div style="color: var(--text-secondary);">No moves yet</div>';
        return;
      }

      let html = '';
      for (let i = 0; i < moveHistory.length; i++) {
        html += `<div class="move-pair">`;
        html += `<span class="move-num">${i + 1}.</span>`;
        html += `<span class="move-white">${moveHistory[i].white || ''}</span>`;
        html += `<span class="move-black">${moveHistory[i].black || ''}</span>`;
        html += `</div>`;
      }
      historyEl.innerHTML = html;
      historyEl.scrollTop = historyEl.scrollHeight;
    }

    function setupMoveLabels() {
      const fileLabels = document.getElementById('fileLabels');
      fileLabels.innerHTML = '';
      for (let c = 0; c < 6; c++) {
        const label = document.createElement('span');
        label.className = 'file-label';
        label.textContent = String.fromCharCode('a'.charCodeAt(0) + c);
        fileLabels.appendChild(label);
      }
    }

    function showGameOver(result) {
      const overlay = document.getElementById('gameOverOverlay');
      const card = document.getElementById('gameOverCard');

      let titleText = '';
      let titleClass = '';
      let message = '';

      if (result === 'white_wins') {
        if (myColor === 'white') {
          titleText = 'You Win!';
          titleClass = 'win-text';
        } else {
          titleText = 'You Lose';
          titleClass = 'lose-text';
        }
      } else if (result === 'black_wins') {
        if (myColor === 'black') {
          titleText = 'You Win!';
          titleClass = 'win-text';
        } else {
          titleText = 'You Lose';
          titleClass = 'lose-text';
        }
      } else {
        titleText = 'Draw!';
        titleClass = 'draw-text';
      }

      card.innerHTML = `
        <h2 class="${titleClass}">${titleText}</h2>
        <p class="elo-change">Result: ${result.replace('_', ' ')}</p>
        <button onclick="window.location.href='lobby.html'">Back to Lobby</button>
      `;

      overlay.style.display = 'flex';
    }

    function resignGame() {
      if (gameOver || isReplay) return;
      if (confirm('Are you sure you want to resign?')) {
        socket.emit('resign', { gameId: gameId });
        gameOver = true;
      }
    }

    function toggleDraw() {
      if (gameOver || isReplay) return;
      const btn = document.getElementById('drawBtn');

      if (drawOffered) {
        socket.emit('cancel_draw', { gameId: gameId });
        btn.textContent = 'Draw';
        drawOffered = false;
        showToast('Draw offer cancelled', 'info');
      } else {
        socket.emit('request_draw', { gameId: gameId });
        btn.textContent = 'Cancel Draw';
        drawOffered = true;
        showToast('Draw offered — waiting...', 'info');
      }
    }

    function showToast(message, type, actionButtons) {
      const toast = document.createElement('div');
      toast.className = 'toast ' + type;

      if (actionButtons) {
        const span = document.createElement('span');
        span.textContent = message;
        span.style.marginRight = '10px';
        toast.appendChild(span);

        actionButtons.forEach(btn => {
          const b = document.createElement('button');
          b.className = 'toast-action';
          b.textContent = btn.label;
          b.addEventListener('click', () => {
            btn.action();
            toast.remove();
          });
          toast.appendChild(b);
        });
      } else {
        toast.textContent = message;
      }

      document.body.appendChild(toast);
      setTimeout(() => { if (toast.parentNode) toast.remove(); }, actionButtons ? 10000 : 4000);
    }

    function getPieceSymbol(piece) {
      return `<img src="img/pieces/${piece.color[0]}${piece.type}.svg" class="piece-img" draggable="false">`;
    }

    function getPieceSymbolByType(type, color) {
      return `<img src="img/pieces/${color[0]}${type}.svg" class="piece-img" draggable="false">`;
    }

    function syncServerTime(whiteTime, blackTime) {
      lastServerWhiteTime = whiteTime;
      lastServerBlackTime = blackTime;
      lastTimestamp = Date.now();

      if (clockInterval) clearInterval(clockInterval);
      clockInterval = setInterval(tickClock, 200);

      tickClock();
    }

    function tickClock() {
      if (gameOver) {
        if (clockInterval) clearInterval(clockInterval);
        return;
      }
      if (isReplay) return;

      const elapsed = Date.now() - lastTimestamp;
      let currentWhite = lastServerWhiteTime;
      let currentBlack = lastServerBlackTime;

      if (activeColor === 'white') {
        currentWhite = Math.max(0, lastServerWhiteTime - elapsed);
      } else {
        currentBlack = Math.max(0, lastServerBlackTime - elapsed);
      }

      const playerClock = document.getElementById('playerClock');
      const opponentClock = document.getElementById('opponentClock');
      const myTime = myColor === 'white' ? currentWhite : currentBlack;
      const oppTime = myColor === 'white' ? currentBlack : currentWhite;

      playerClock.textContent = formatClock(myTime);
      opponentClock.textContent = formatClock(oppTime);

      playerClock.classList.toggle('active-clock', activeColor === myColor);
      opponentClock.classList.toggle('active-clock', activeColor !== myColor);
      playerClock.classList.toggle('low-time', myTime <= 10000);
      opponentClock.classList.toggle('low-time', oppTime <= 10000);
    }

    function formatClock(ms) {
      const totalSec = Math.max(0, Math.ceil(ms / 1000));
      const min = Math.floor(totalSec / 60);
      const sec = totalSec % 60;
      return min + ':' + String(sec).padStart(2, '0');
    }

    // ==================== Drag & Drop ====================

    function onDragStart(e, row, col) {
      if (gameOver || isReplay) return;
      if (myColor !== activeColor) return;
      const piece = boardState.board[row][col];
      if (!piece || piece.color !== myColor) return;

      dragFromRow = row;
      dragFromCol = col;
      dragPocketType = null;
      selectedSquare = { row, col };
      selectedPocketPiece = null;
      document.querySelectorAll('.pocket-piece.selected-drop').forEach(el => el.classList.remove('selected-drop'));
      possibleMoves = getLegalMoves(boardState, row, col);

      document.querySelectorAll('.square').forEach(s => {
        const r = parseInt(s.dataset.row);
        const c = parseInt(s.dataset.col);
        s.classList.remove('selected', 'possible-move', 'possible-capture', 'drag-origin', 'drag-over');
        if (r === row && c === col) {
          s.classList.add('selected', 'drag-origin');
        }
        const sq = coordsToSquare(r, c);
        const move = possibleMoves.find(m => m.to === sq);
        if (move) {
          if (boardState.board[r][c] !== null || move.isEnPassant) {
            s.classList.add('possible-capture');
          } else {
            s.classList.add('possible-move');
          }
        }
      });

      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    }

    function onDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
    }

    function onDragEnter(e, row, col) {
      e.preventDefault();
      if (row === dragFromRow && col === dragFromCol) return;
      const squares = document.querySelectorAll('.square');
      squares.forEach(s => {
        if (parseInt(s.dataset.row) === row && parseInt(s.dataset.col) === col) {
          s.classList.add('drag-over');
        }
      });
    }

    function onDragLeave(e, row, col) {
      const squares = document.querySelectorAll('.square');
      squares.forEach(s => {
        if (parseInt(s.dataset.row) === row && parseInt(s.dataset.col) === col) {
          s.classList.remove('drag-over');
        }
      });
    }

    function onDrop(e, row, col) {
      e.preventDefault();
      document.querySelectorAll('.square').forEach(s => {
        s.classList.remove('drag-over', 'drag-origin');
      });
      onDragEnd(row, col);
    }

    function onDragEnd(row, col) {
      if (gameOver || isReplay) return;

      if (dragPocketType !== null) {
        const piece = boardState.board[row][col];
        if (piece !== null) {
          dragPocketType = null;
          dragFromRow = null;
          dragFromCol = null;
          return;
        }
        selectedPocketPiece = dragPocketType;
        sendDropMove(coordsToSquare(row, col));
        selectedPocketPiece = null;
      } else if (dragFromRow !== null) {
        const sqName = coordsToSquare(row, col);
        const move = possibleMoves.find(m => m.to === sqName);
        if (!move) {
          selectedSquare = null;
          possibleMoves = [];
          renderBoard();
          dragFromRow = null;
          dragFromCol = null;
          return;
        }
        if (move.promotion) {
          showPromotionDialog(move);
          dragFromRow = null;
          dragFromCol = null;
          return;
        }
        sendMove({ row: dragFromRow, col: dragFromCol }, { row, col }, null);
      }

      selectedSquare = null;
      possibleMoves = [];
      dragFromRow = null;
      dragFromCol = null;
      dragPocketType = null;
    }

    function onPocketDragStart(e, type) {
      if (gameOver || isReplay) return;
      if (myColor !== activeColor) return;
      dragPocketType = type;
      dragFromRow = null;
      dragFromCol = null;
      selectedSquare = null;
      selectedPocketPiece = null;
      possibleMoves = [];
      document.querySelectorAll('.pocket-piece.selected-drop').forEach(el => el.classList.remove('selected-drop'));
      document.querySelectorAll('.square').forEach(s => {
        s.classList.remove('selected', 'possible-move', 'possible-capture', 'drag-origin', 'drag-over');
      });
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', '');
    }

    function onPocketDragEnd(e) {
      // Cleanup if drop didn't fire
    }

    // ==================== Utilities ====================

    function formatMove(move) {
      if (move.isDrop) {
        return `@${move.to}${move.pieceType.toUpperCase()}`;
      }
      let notation = '';
      if (move.pieceType) {
        notation += move.pieceType.toUpperCase();
      }
      if (move.captured) {
        notation += 'x';
      }
      notation += move.to;
      if (move.promotion) {
        notation += '=' + move.promotion.toUpperCase();
      }
      return notation;
    }

    // ==================== Animations ====================

    function getSquareCenter(squareName) {
      const boardEl = document.getElementById('chessBoard');
      const squares = boardEl.querySelectorAll('.square');
      for (const s of squares) {
        const r = parseInt(s.dataset.row);
        const c = parseInt(s.dataset.col);
        if (coordsToSquare(r, c) === squareName) {
          const rect = s.getBoundingClientRect();
          const boardRect = boardEl.getBoundingClientRect();
          return {
            x: rect.left - boardRect.left + rect.width / 2,
            y: rect.top - boardRect.top + rect.height / 2,
            rect: rect
          };
        }
      }
      return null;
    }

    function animateMove(move, callback) {
      const boardEl = document.getElementById('chessBoard');
      if (!boardEl || !move) {
        callback();
        return;
      }

      if (move.isDrop) {
        callback();
        setTimeout(() => {
          const toCoords = squareToCoords(move.to);
          const squares = boardEl.querySelectorAll('.square');
          for (const s of squares) {
            if (parseInt(s.dataset.row) === toCoords.row && parseInt(s.dataset.col) === toCoords.col) {
              const img = s.querySelector('.piece-img');
              if (img) {
                img.classList.add('piece-drop');
                setTimeout(() => img.classList.remove('piece-drop'), 300);
              }
              break;
            }
          }
        }, 20);
        return;
      }

      const fromCenter = getSquareCenter(move.from);
      const toCenter = getSquareCenter(move.to);

      if (!fromCenter || !toCenter) {
        callback();
        return;
      }

      const toCoords = squareToCoords(move.to);
      const targetPiece = boardState && boardState.board[toCoords.row] ? boardState.board[toCoords.row][toCoords.col] : null;
      if (targetPiece) {
        const targetSquareEl = boardEl.querySelector(`.square[data-row="${toCoords.row}"][data-col="${toCoords.col}"]`);
        if (targetSquareEl) {
          const targetImg = targetSquareEl.querySelector('.piece-img');
          if (targetImg) {
            targetImg.classList.add('piece-captured');
            setTimeout(() => {
              if (targetImg.parentNode) targetImg.style.opacity = '0';
            }, 100);
          }
        }
      }

      const ghost = document.createElement('img');
      const movingCoords = squareToCoords(move.from);
      const movingPiece = boardState && boardState.board[movingCoords.row] ? boardState.board[movingCoords.row][movingCoords.col] : null;
      if (!movingPiece) {
        callback();
        return;
      }
      ghost.src = `img/pieces/${movingPiece.color[0]}${movingPiece.type}.svg`;
      ghost.className = 'piece-ghost';
      ghost.style.position = 'absolute';
      ghost.style.transform = `translate(${(fromCenter.x - 24)}px, ${(fromCenter.y - 24)}px)`;
      ghost.style.width = '48px';
      ghost.style.height = '48px';
      ghost.style.pointerEvents = 'none';
      ghost.style.zIndex = '100';
      ghost.style.transition = 'transform 200ms ease-out';
      boardEl.appendChild(ghost);

      requestAnimationFrame(() => {
        ghost.style.transform = `translate(${(toCenter.x - 24)}px, ${(toCenter.y - 24)}px)`;
      });

      setTimeout(() => {
        if (ghost.parentNode) ghost.remove();
        callback();
      }, 220);
    }

    init();
  </script>
</body>
</html>
