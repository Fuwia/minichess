<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChess — Profile</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --page-bg: #0d1117;
      --surface: #181b20;
      --surface2: #1f2229;
      --surface3: #262930;
      --border-subtle: rgba(255,255,255,0.06);
      --border-glass: rgba(255,255,255,0.08);
      --text-bright: #f0f3f7;
      --text-dim: #8b949e;
      --text-muted: #5c6470;
      --emerald: #3fb950;
      --emerald-glow: rgba(63,185,80,0.3);
      --gold: #d2991d;
      --gold-glow: rgba(210,153,29,0.25);
      --red-soft: #f85149;
      --accent-purple: #7c3aed;
      --accent-blue: #3b82f6;
      --accent-cyan: #06b6d4;
      --glass-surface: linear-gradient(135deg, rgba(24,27,32,0.85), rgba(31,34,41,0.75));
      --glass-border: rgba(255,255,255,0.07);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--page-bg);
      color: var(--text-bright);
      min-height: 100vh;
      overflow-x: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 180px 1fr;
      min-height: 100vh;
      width: 100%;
    }

    /* ===== SIDEBAR ===== */
    .sidebar {
      background: #111318; border-right: 1px solid rgba(255,255,255,0.05);
      padding: 20px 0; display: flex; flex-direction: column;
      position: sticky; top: 0; height: 100vh; z-index: 10;
    }
    .sidebar-logo { padding: 0 8px 10px; border-bottom: 1px solid rgba(255,255,255,0.05); margin-bottom: 4px; }
    .sidebar-nav { flex: 1; padding: 0 6px; display: flex; flex-direction: column; gap: 0; justify-content: flex-start; }
    .sidebar-nav a {
      display: flex; align-items: center; gap: 7px; padding: 0 8px; margin: 0; line-height: 1;
      min-height: 38px; border-radius: 8px; color: var(--text-dim); text-decoration: none;
      font-size: 15px; font-weight: 500; transition: all 0.2s ease;
    }
    .sidebar-nav a:hover { background: rgba(255,255,255,0.04); color: var(--text-bright); }
    .sidebar-nav a.active { background: rgba(63,185,80,0.12); color: var(--emerald); font-weight: 600; }
    .sidebar-nav a .nav-icon { font-size: 18px; width: 22px; text-align: center; opacity: 0.8; }
    .sidebar-footer { padding: 16px 16px; border-top: 1px solid rgba(255,255,255,0.05); }
    .sidebar-footer .user-mini { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .sidebar-footer .user-avatar {
      width: 34px; height: 34px; border-radius: 50%; background: var(--emerald); color: #000;
      display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 14px;
      flex-shrink: 0; overflow: hidden;
    }
    .sidebar-footer .user-avatar-img { width: 34px; height: 34px; border-radius: 50%; object-fit: cover; flex-shrink: 0; }
    .sidebar-footer .user-name { font-size: 13px; font-weight: 600; color: var(--text-bright); }
    .sidebar-footer .user-elo-sm { font-size: 11px; color: var(--gold); font-weight: 600; }
    .sidebar-footer .sidebar-stats { display: flex; gap: 6px; margin-bottom: 10px; }
    .sidebar-footer .sidebar-stat { flex: 1; background: var(--surface2); border-radius: 6px; padding: 5px 4px; text-align: center; }
    .sidebar-footer .sidebar-stat .sb-val { font-size: 14px; font-weight: 700; }
    .sidebar-footer .sidebar-stat .sb-lbl { font-size: 9px; color: var(--text-muted); text-transform: uppercase; }
    .sidebar-footer .sb-win .sb-val { color: var(--emerald); }
    .sidebar-footer .sb-loss .sb-val { color: var(--red-soft); }
    .sidebar-footer .sb-draw .sb-val { color: var(--text-dim); }
    .sidebar-footer .logout-btn {
      width: 100%; padding: 7px 12px; background: transparent; border: 1px solid var(--glass-border);
      border-radius: 8px; color: var(--text-dim); font-size: 12px; font-weight: 500;
      cursor: pointer; transition: all 0.2s ease;
    }
    .sidebar-footer .logout-btn:hover { border-color: var(--red-soft); color: var(--red-soft); }

    /* ===== MAIN CONTENT ===== */
    .main-content { padding: 28px 32px; overflow-y: auto; max-height: 100vh; transition: opacity 180ms ease; }
    .main-content::-webkit-scrollbar { width: 6px; }
    .main-content::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 3px; }

    .card {
      background: var(--glass-surface); border: 1px solid var(--glass-border);
      border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }

    /* Header */
    .profile-top { display: flex; align-items: center; gap: 20px; margin-bottom: 24px; }
    .profile-avatar-lg {
      width: 80px; height: 80px; border-radius: 50%; object-fit: cover;
      border: 3px solid var(--emerald); flex-shrink: 0;
    }
    .profile-avatar-placeholder-lg {
      width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, var(--emerald), var(--accent-cyan));
      display: flex; align-items: center; justify-content: center; font-size: 34px; font-weight: 800;
      color: #000; flex-shrink: 0;
    }
    .profile-info h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .profile-info .elo-display { font-size: 22px; font-weight: 800; color: var(--gold); }
    .profile-info .elo-display span { font-size: 12px; font-weight: 400; color: var(--text-muted); }
    .profile-info .member-since { font-size: 12px; color: var(--text-dim); margin-top: 4px; }
    .profile-top-right { margin-left: auto; display: flex; gap: 10px; align-items: center; }
    .btn-accent { padding: 10px 20px; background: var(--emerald); color: #000; border: none; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s ease; }
    .btn-accent:hover { box-shadow: 0 4px 16px var(--emerald-glow); }
    .profile-avatar-wrapper { position: relative; flex-shrink: 0; }
    .profile-avatar-wrapper.own-avatar { cursor: pointer; }
    .profile-avatar-wrapper.own-avatar .profile-avatar-lg,
    .profile-avatar-wrapper.own-avatar .profile-avatar-placeholder-lg {
      transition: filter 0.2s ease;
    }
    .profile-avatar-wrapper.own-avatar:hover .profile-avatar-lg,
    .profile-avatar-wrapper.own-avatar:hover .profile-avatar-placeholder-lg {
      filter: brightness(0.7);
    }
    .avatar-hover-overlay {
      position: absolute; top: 0; left: 0; width: 100%; height: 100%;
      border-radius: 50%; display: flex; align-items: center; justify-content: center;
      pointer-events: none; opacity: 0; transition: opacity 0.2s ease;
      z-index: 2; font-size: 28px; color: #fff;
    }
    .profile-avatar-wrapper.own-avatar:hover .avatar-hover-overlay {
      opacity: 1;
    }

    /* Stats */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 24px; }
    .stat-box { background: var(--surface2); border-radius: 12px; padding: 16px 12px; text-align: center; }
    .stat-box .st-val { font-size: 22px; font-weight: 700; margin-bottom: 2px; }
    .stat-box .st-lbl { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }
    .st-win .st-val { color: var(--emerald); }
    .st-loss .st-val { color: var(--red-soft); }
    .st-draw .st-val { color: var(--text-dim); }

    /* Friends */
    .friends-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .friend-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 14px; background: var(--surface2); border-radius: 10px;
      margin-bottom: 6px; transition: all 0.2s ease;
    }
    .friend-item:hover { background: var(--surface3); }
    .friend-name-link { color: var(--text-bright); text-decoration: none; font-weight: 600; font-size: 14px; }
    .friend-name-link:hover { color: var(--accent-cyan); }
    .friend-elo { color: var(--gold); font-size: 13px; font-weight: 600; }
    .friend-form { display: flex; gap: 8px; }
    .friend-form input {
      flex: 1; padding: 10px 14px; background: var(--surface);
      border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text-bright);
      font-size: 14px; font-family: inherit;
    }
    .friend-form button {
      padding: 10px 18px; background: var(--accent-blue); color: #fff;
      border: none; border-radius: 10px; font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s ease;
    }
    .friend-form button:hover { background: #4f8ef7; }
    .friend-status { font-size: 12px; margin-top: 6px; }
    .friend-status.success { color: var(--emerald); }
    .friend-status.error { color: var(--red-soft); }

    .btn-danger-sm {
      padding: 6px 14px; background: transparent; border: 1px solid var(--red-soft);
      color: var(--red-soft); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-danger-sm:hover { background: var(--red-soft); color: #fff; }
    .btn-accept-sm {
      padding: 6px 14px; background: rgba(63,185,80,0.15); border: 1px solid var(--emerald);
      color: var(--emerald); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-accept-sm:hover { background: var(--emerald); color: #000; }
    .btn-decline-sm {
      padding: 6px 14px; background: transparent; border: 1px solid var(--text-muted);
      color: var(--text-muted); border-radius: 6px; font-size: 12px; cursor: pointer; transition: all 0.2s;
    }
    .btn-decline-sm:hover { border-color: var(--red-soft); color: var(--red-soft); }

    .empty-list { color: var(--text-muted); font-size: 13px; padding: 12px 0; }

    /* Match History */
    .match-row {
      display: flex; align-items: center; gap: 16px; padding: 12px 14px;
      background: var(--surface2); border-radius: 10px; margin-bottom: 6px;
      text-decoration: none; transition: all 0.2s ease;
    }
    .match-row:hover { background: var(--surface3); }
    .match-result { width: 56px; text-align: center; padding: 6px 0; border-radius: 8px; font-size: 13px; font-weight: 700; }
    .match-win { background: rgba(63,185,80,0.18); color: var(--emerald); }
    .match-loss { background: rgba(248,81,73,0.18); color: var(--red-soft); }
    .match-draw { background: rgba(255,255,255,0.06); color: var(--text-dim); }
    .match-info .match-opponent { color: var(--text-bright); font-size: 14px; font-weight: 500; }
    .match-info .match-color { color: var(--text-dim); font-size: 12px; margin-left: 8px; }
    .match-date { margin-left: auto; font-size: 12px; color: var(--text-muted); }

    .match-pagination { display: flex; gap: 10px; align-items: center; justify-content: center; margin-top: 16px; }
    .page-btn {
      padding: 8px 18px; background: var(--surface2); border: 1px solid var(--glass-border);
      border-radius: 8px; color: var(--text-dim); font-size: 13px; cursor: pointer; transition: all 0.2s;
    }
    .page-btn:hover { background: var(--surface3); color: var(--text-bright); }
    .page-btn:disabled { opacity: 0.3; cursor: default; }
    .page-info { font-size: 13px; color: var(--text-dim); }

    .avatar-cooldown-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.6); z-index: 1000; display: flex;
      align-items: center; justify-content: center; font-size: 28px; color: var(--gold);
    }

    @media (max-width: 900px) {
      .dashboard { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; flex-direction: row; padding: 12px; border-right: none; border-bottom: 1px solid var(--border-subtle); }
      .sidebar-logo { border-bottom: none; margin-bottom: 0; padding: 0 12px; display: none; }
      .sidebar-nav { flex-direction: row; flex-wrap: wrap; }
      .sidebar-footer { display: none; }
      .main-content { padding: 20px 16px; max-height: none; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .friends-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="dashboard">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
      <img src="img/logo.png" alt="MiniChess" style="width:100%;max-height:180px;object-fit:contain;object-position:left;" onerror="this.style.display='none'">
    </div>
    <nav class="sidebar-nav">
      <a href="lobby.html" id="navPlay"><span class="nav-icon">▶</span> Play</a>
      <a href="leaderboard.html" id="navLeaderboard"><span class="nav-icon">🏆</span> Leaderboard</a>
      <a href="profile.html" class="active" id="navProfile"><span class="nav-icon">👤</span> Profile</a>
      <a href="admin.html" id="navAdmin" style="display:none;"><span class="nav-icon">⚙</span> Admin</a>
    </nav>
    <div class="sidebar-footer">
      <div class="user-mini">
        <img class="user-avatar-img" id="sidebarAvatarImg" src="" alt="" style="display:none;">
        <div class="user-avatar" id="sidebarAvatarFallback">?</div>
        <div>
          <div class="user-name" id="sidebarUsername">...</div>
          <div class="user-elo-sm" id="sidebarElo">1200</div>
        </div>
      </div>
      <div class="sidebar-stats">
        <div class="sidebar-stat sb-win"><div class="sb-val" id="sbWins">0</div><div class="sb-lbl">W</div></div>
        <div class="sidebar-stat sb-loss"><div class="sb-val" id="sbLosses">0</div><div class="sb-lbl">L</div></div>
        <div class="sidebar-stat sb-draw"><div class="sb-val" id="sbDraws">0</div><div class="sb-lbl">D</div></div>
      </div>
      <button class="logout-btn" onclick="logout()">Sign Out</button>
    </div>
  </aside>

  <main class="main-content">
    <div class="card">
      <div class="profile-top">
        <div class="profile-avatar-wrapper" id="avatarWrapper">
          <img id="profileAvatar" class="profile-avatar-lg" src="" alt="" style="display:none;">
          <div id="profileAvatarPlaceholder" class="profile-avatar-placeholder-lg">?</div>
          <div class="avatar-hover-overlay" id="avatarHoverOverlay">📷</div>
          <input type="file" id="avatarFileInput" accept="image/*" onchange="uploadAvatar(event)" style="display:none;">
        </div>
        <div class="profile-info">
          <h1 id="profileUsername">—</h1>
          <div class="elo-display"><span id="profileElo">1200</span> <span>ELO</span></div>
          <div class="member-since" id="profileMemberSince"></div>
        </div>
        <div class="profile-top-right" id="profileActions">
        </div>
      </div>

      <div class="stats-row">
        <div class="stat-box st-win"><div class="st-val" id="profileWins">0</div><div class="st-lbl">Wins</div></div>
        <div class="stat-box st-loss"><div class="st-val" id="profileLosses">0</div><div class="st-lbl">Losses</div></div>
        <div class="stat-box st-draw"><div class="st-val" id="profileDraws">0</div><div class="st-lbl">Draws</div></div>
        <div class="stat-box"><div class="st-val" id="profileWinRate" style="color:var(--text-bright);">—%</div><div class="st-lbl">Win Rate</div></div>
      </div>
    </div>

    <div id="ownProfileSections" style="display:none;">
      <div class="friends-grid">
        <div class="card">
          <h3 style="font-size:16px;font-weight:600;margin-bottom:12px;">Friends</h3>
          <div id="friendsList"><div class="empty-list">No friends yet.</div></div>
        </div>
        <div>
          <div class="card" style="margin-bottom:12px;">
            <h3 style="font-size:16px;font-weight:600;margin-bottom:10px;">Add Friend</h3>
            <div class="friend-form">
              <input type="text" id="friendUsername" placeholder="Enter username...">
              <button id="addFriendBtn" onclick="addFriend()">Send Request</button>
            </div>
            <div id="addFriendStatus" class="friend-status"></div>
          </div>
          <div class="card" id="pendingCard" style="display:none;">
            <h3 style="font-size:16px;font-weight:600;margin-bottom:10px;">Pending</h3>
            <div id="pendingList"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="card" id="matchHistoryCard">
      <h3 style="font-size:16px;font-weight:600;margin-bottom:14px;">Game History</h3>
      <div id="matchHistoryList"><div class="empty-list">No games played yet.</div></div>
      <div id="matchPagination" class="match-pagination" style="display:none;"></div>
    </div>
  </main>

  <div id="avatarCooldownOverlay" class="avatar-cooldown-overlay" style="display:none;">
    <div>⏳ <span id="cooldownSeconds">30</span>s</div>
  </div>
</div>

<script src="js/auth.js"></script>
<script src="js/spa.js"></script>
<script>
  let currentUser = null;
  let profileUser = null;
  let isOwnProfile = false;
  let matchPage = 0;
  let matchTotal = 0;
  let avatarCooldownRemaining = 0;
  let avatarCooldownInterval = null;
  const MATCH_PAGE_SIZE = 10;

  function getUsernameFromUrl() {
    return (new URLSearchParams(window.location.search)).get('username') || null;
  }

  async function init() {
    try {
      currentUser = await getCurrentUser();
      if (!currentUser) { window.location.href = 'index.html'; return; }
    } catch (e) { return; }

    // Sidebar
    document.getElementById('sidebarUsername').textContent = currentUser.username;
    document.getElementById('sidebarElo').textContent = currentUser.elo;
    if (currentUser.avatar_url) {
      document.getElementById('sidebarAvatarImg').src = currentUser.avatar_url;
      document.getElementById('sidebarAvatarImg').style.display = '';
      document.getElementById('sidebarAvatarFallback').style.display = 'none';
    } else {
      document.getElementById('sidebarAvatarFallback').textContent = (currentUser.username || '?').charAt(0).toUpperCase();
    }
    document.getElementById('sbWins').textContent = currentUser.wins || 0;
    document.getElementById('sbLosses').textContent = currentUser.losses || 0;
    document.getElementById('sbDraws').textContent = currentUser.draws || 0;

    fetch('/api/me/admin').then(r => r.json()).then(d => {
      if (d.isAdmin) document.getElementById('navAdmin').style.display = 'flex';
    }).catch(() => {});

    const urlUsername = getUsernameFromUrl();

    if (!urlUsername || urlUsername.toLowerCase() === currentUser.username.toLowerCase()) {
      isOwnProfile = true;
      profileUser = currentUser;
      document.getElementById('ownProfileSections').style.display = '';
      document.getElementById('avatarWrapper').classList.add('own-avatar');
      document.getElementById('avatarWrapper').onclick = () => document.getElementById('avatarFileInput').click();
      renderProfileHeader(currentUser.username, currentUser.elo, currentUser.avatar_url, currentUser.created_at);
      updateStats(currentUser.wins, currentUser.losses, currentUser.draws);
      await loadFriends();
      await loadMatchHistoryPage(0);
    } else {
      isOwnProfile = false;
      document.getElementById('ownProfileSections').style.display = 'none';
      document.getElementById('avatarWrapper').classList.remove('own-avatar');
      document.getElementById('avatarWrapper').onclick = null;
      try {
        const res = await fetch('/api/users/by-username/' + encodeURIComponent(urlUsername));
        const data = await res.json();
        if (!data.success || !data.user) {
          document.getElementById('profileUsername').textContent = 'User Not Found';
          document.getElementById('matchHistoryList').innerHTML = '<div class="empty-list" style="color:var(--red-soft);">User not found.</div>';
          return;
        }
        profileUser = data.user;
        renderProfileHeader(profileUser.username, profileUser.elo, profileUser.avatarUrl, profileUser.createdAt);
        updateStats(profileUser.wins || 0, profileUser.losses || 0, profileUser.draws || 0);
        document.getElementById('profileActions').innerHTML = `<button class="btn-accent" onclick="sendFriendRequestTo('${escapeAttr(profileUser.username)}')">👥 Add Friend</button>`;
      } catch (err) {
        document.getElementById('matchHistoryList').innerHTML = '<div class="empty-list" style="color:var(--red-soft);">Failed to load profile.</div>';
        return;
      }
      await loadMatchHistoryPage(0);
    }
  }

  function renderProfileHeader(username, elo, avatarUrl, createdAt) {
    document.getElementById('profileUsername').textContent = username || '—';
    document.getElementById('profileElo').textContent = elo || '1200';
    const av = document.getElementById('profileAvatar');
    const ph = document.getElementById('profileAvatarPlaceholder');
    if (avatarUrl) {
      av.src = avatarUrl; av.style.display = ''; ph.style.display = 'none';
    } else {
      av.style.display = 'none'; ph.style.display = ''; ph.textContent = (username || '?').charAt(0).toUpperCase();
    }
    if (createdAt) {
      try {
        document.getElementById('profileMemberSince').textContent = 'Member since ' + new Date(createdAt.replace(' ', 'T')).toLocaleDateString('en-US', { year: 'numeric', month: 'short' });
      } catch(e) {}
    }
  }

  function updateStats(w, l, d) {
    w = w || 0; l = l || 0; d = d || 0;
    document.getElementById('profileWins').textContent = w;
    document.getElementById('profileLosses').textContent = l;
    document.getElementById('profileDraws').textContent = d;
    const t = w + l + d;
    document.getElementById('profileWinRate').textContent = t > 0 ? Math.round((w / t) * 100) + '%' : '—%';
  }

  async function uploadAvatar(e) {
    const file = e.target.files[0]; if (!file) return;
    const fd = new FormData(); fd.append('avatar', file);
    try {
      const res = await fetch('/api/me/avatar', { method: 'POST', body: fd });
      const data = await res.json();
      if (data.success) {
        document.getElementById('profileAvatar').src = data.avatarUrl + '?t=' + Date.now();
        document.getElementById('profileAvatar').style.display = '';
        document.getElementById('profileAvatarPlaceholder').style.display = 'none';
      } else if (data.message && data.message.includes('wait')) {
        startCooldown(parseInt(data.message.match(/\d+/)?.[0]) || 30);
      } else { alert(data.message || 'Upload failed'); }
    } catch(err) { alert('Upload failed.'); }
    e.target.value = '';
  }

  function startCooldown(s) {
    avatarCooldownRemaining = s;
    document.getElementById('cooldownSeconds').textContent = s;
    document.getElementById('avatarCooldownOverlay').style.display = 'flex';
    if (avatarCooldownInterval) clearInterval(avatarCooldownInterval);
    avatarCooldownInterval = setInterval(() => {
      avatarCooldownRemaining--;
      document.getElementById('cooldownSeconds').textContent = avatarCooldownRemaining;
      if (avatarCooldownRemaining <= 0) {
        clearInterval(avatarCooldownInterval);
        document.getElementById('avatarCooldownOverlay').style.display = 'none';
      }
    }, 1000);
  }

  function sendFriendRequestTo(username) {
    fetch('/api/friends/request', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ friendUsername: escapeText(username) })
    }).then(r => r.json()).then(d => alert(d.message || 'Sent!')).catch(() => alert('Failed'));
  }

  async function loadFriends() {
    try {
      const res = await fetch('/api/friends');
      const data = (res.ok) ? await res.json() : null;
      if (!data || !data.success) return;
      renderFriends(data.friends || []);
      renderPending(data.pending || []);
    } catch(e) {}
  }

  function renderFriends(friends) {
    const c = document.getElementById('friendsList');
    if (!friends.length) { c.innerHTML = '<div class="empty-list">No friends yet.</div>'; return; }
    c.innerHTML = friends.map(f => `<div class="friend-item">
      <div><a href="profile.html?username=${encodeURIComponent(escapeText(f.username))}" class="friend-name-link">${escapeText(f.username)}</a> <span class="friend-elo">${f.elo||'1200'} ELO</span></div>
      <button class="btn-danger-sm" onclick="removeFriend(${f.id})">Remove</button>
    </div>`).join('');
  }

  function renderPending(pending) {
    const card = document.getElementById('pendingCard');
    const c = document.getElementById('pendingList');
    if (!pending.length) { card.style.display = 'none'; return; }
    card.style.display = 'block';
    c.innerHTML = pending.map(p => `<div class="friend-item">
      <div><span class="friend-name-link">${escapeText(p.username)}</span> <span class="friend-elo">${p.elo||'1200'} ELO</span></div>
      <div style="display:flex;gap:6px;">
        <button class="btn-accept-sm" onclick="acceptRequest(${p.id})">Accept</button>
        <button class="btn-decline-sm" onclick="declineRequest(${p.id})">Decline</button>
      </div></div>`).join('');
  }

  async function addFriend() {
    const uname = document.getElementById('friendUsername').value.trim();
    const s = document.getElementById('addFriendStatus');
    if (!uname) { s.textContent = 'Enter a username'; s.className = 'friend-status error'; return; }
    s.textContent = 'Sending...'; s.className = 'friend-status';
    try {
      const r = await fetch('/api/friends/request', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({friendUsername:uname}) });
      const d = await r.json();
      s.textContent = d.message || (d.success ? 'Sent!' : 'Failed'); s.className = 'friend-status ' + (d.success ? 'success' : 'error');
      if (d.success) { document.getElementById('friendUsername').value = ''; await loadFriends(); }
    } catch(e) { s.textContent = 'Network error'; s.className = 'friend-status error'; }
  }

  async function acceptRequest(id) { await fetch('/api/friends/accept', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requestId:id})}); await loadFriends(); }
  async function declineRequest(id) { await fetch('/api/friends/decline', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({requestId:id})}); await loadFriends(); }
  async function removeFriend(id) { if(!confirm('Remove?')) return; await fetch('/api/friends/remove', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({friendId:id})}); await loadFriends(); }

  async function loadMatchHistoryPage(page) {
    matchPage = page;
    const offset = page * MATCH_PAGE_SIZE;
    const userId = profileUser ? profileUser.id : currentUser.id;
    try {
      const res = await fetch('/api/users/' + userId + '/games?limit=' + MATCH_PAGE_SIZE + '&offset=' + offset);
      const data = await res.json();
      if (!data || !data.success) {
        document.getElementById('matchHistoryList').innerHTML = '<div class="empty-list" style="color:var(--red-soft);">⚠ Could not load history.</div>';
        return;
      }
      matchTotal = data.total || 0;
      if (!data.games || !data.games.length) {
        document.getElementById('matchHistoryList').innerHTML = '<div class="empty-list">No games played yet.</div>';
        document.getElementById('matchPagination').style.display = 'none'; return;
      }
      let html = '';
      data.games.forEach(g => {
        let rc = '', rl = '';
        if (g.result === 'win') { rc='match-win'; rl='Win'; }
        else if (g.result === 'loss') { rc='match-loss'; rl='Loss'; }
        else { rc='match-draw'; rl='Draw'; }
        html += `<a href="game.html?matchId=${escapeAttr(g.gameUuid)}" class="match-row">
          <div class="match-result ${rc}">${rl}</div>
          <div class="match-info"><span class="match-opponent">vs ${escapeText(g.opponent.username)} (${g.opponent.elo || '—'})</span><span class="match-color">as ${g.playerColor}</span></div>
          <div class="match-date">${formatDate(g.createdAt)}</div></a>`;
      });
      document.getElementById('matchHistoryList').innerHTML = html;
      const totalPages = Math.max(1, Math.ceil(matchTotal / MATCH_PAGE_SIZE));
      const pel = document.getElementById('matchPagination');
      if (totalPages <= 1) { pel.style.display = 'none'; } else {
        pel.style.display = 'flex';
        pel.innerHTML = (page > 0 ? `<button class="page-btn" onclick="loadMatchHistoryPage(${page-1})">← Prev</button>` : '<button class="page-btn" disabled>← Prev</button>')
          + `<span class="page-info">Page ${page+1} of ${totalPages}</span>`
          + (page < totalPages-1 ? `<button class="page-btn" onclick="loadMatchHistoryPage(${page+1})">Next →</button>` : '<button class="page-btn" disabled>Next →</button>');
      }
    } catch(e) {
      document.getElementById('matchHistoryList').innerHTML = '<div class="empty-list" style="color:var(--red-soft);">⚠ Failed to load history.</div>';
    }
  }

  function formatDate(d) {
    if (!d) return ''; try { const dt = new Date(d), n = new Date(), diff = Math.floor((n-dt)/86400000);
      if (diff===0) return 'Today'; if (diff===1) return 'Yesterday'; if (diff<7) return diff+'d ago'; return dt.toLocaleDateString(); } catch(e) { return d; }
  }
  function escapeText(s) { if(!s) return ''; return s.replace(/&/g,'&').replace(/</g,'<').replace(/>/g,'>').replace(/"/g,'"').replace(/'/g,'&#39;'); }
  function escapeAttr(s) { if(!s) return ''; return s.replace(/&/g,'&').replace(/"/g,'"').replace(/</g,'<').replace(/>/g,'>'); }

  init();
</script>
</body>
</html>
