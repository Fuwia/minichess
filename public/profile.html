<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MiniChess - Profile</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav>
    <div class="logo">♟ Mini<span>Chess</span></div>
    <div class="nav-links">
      <a href="lobby.html">Play</a>
      <a href="leaderboard.html">Leaderboard</a>
      <div class="user-info">
        <span class="username" id="navUsername">...</span>
        <span class="elo" id="navElo">1200</span>
        <button class="secondary" onclick="logout()">Logout</button>
      </div>
    </div>
  </nav>

  <div class="profile-container">
    <!-- User stats -->
    <div class="profile-card">
      <h1 id="profileTitle">My Profile</h1>
      <div class="stats">
        <div class="stat-item">
          <div class="stat-value" id="elo">1200</div>
          <div class="stat-label">ELO Rating</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="wins">0</div>
          <div class="stat-label">Wins</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="losses">0</div>
          <div class="stat-label">Losses</div>
        </div>
        <div class="stat-item">
          <div class="stat-value" id="draws">0</div>
          <div class="stat-label">Draws</div>
        </div>
      </div>
    </div>

    <!-- Add Friend -->
    <div class="profile-card">
      <h2>Add Friend</h2>
      <div class="friend-form">
        <input type="text" id="friendUsername" placeholder="Enter username...">
        <button id="addFriendBtn" onclick="addFriend()">Send Request</button>
      </div>
      <div id="addFriendStatus" class="friend-status"></div>
    </div>

    <!-- Pending Requests -->
    <div class="profile-card" id="pendingCard" style="display: none;">
      <h2>Pending Requests</h2>
      <div id="pendingList"></div>
    </div>

    <!-- Friends List -->
    <div class="profile-card" id="friendsCard">
      <h2>Friends</h2>
      <div id="friendsList">
        <div class="empty-list">No friends yet. Add one above!</div>
      </div>
    </div>

    <!-- Play with Friend link -->
    <div class="profile-card" style="text-align: center;">
      <p style="margin-bottom: 10px; color: var(--text-secondary);">Already have friends? Go to the lobby to start a private game.</p>
      <a href="lobby.html" class="btn-accent">Go to Lobby →</a>
    </div>
  </div>

  <script src="js/auth.js"></script>
  <script>
    let currentUser = null;

    async function init() {
      try {
        currentUser = await getCurrentUser();
        if (!currentUser) {
          window.location.href = 'index.html';
          return;
        }
      } catch (err) {
        document.getElementById('navUsername').textContent = 'Error';
        document.getElementById('navElo').textContent = '--';
        document.getElementById('profileTitle').textContent = 'Profile';
        showGlobalError('Failed to load profile. Check your connection and refresh.');
        return;
      }

      document.getElementById('navUsername').textContent = currentUser.username || 'Unknown';
      document.getElementById('navElo').textContent = currentUser.elo || '1200';
      document.getElementById('profileTitle').textContent = (currentUser.username || 'My') + "'s Profile";
      document.getElementById('elo').textContent = currentUser.elo || '1200';
      document.getElementById('wins').textContent = currentUser.wins || '0';
      document.getElementById('losses').textContent = currentUser.losses || '0';
      document.getElementById('draws').textContent = currentUser.draws || '0';

      await loadFriends();
    }

    function showGlobalError(msg) {
      const card = document.getElementById('friendsCard') || document.querySelector('.profile-card');
      if (card) {
        const err = document.createElement('div');
        err.className = 'friend-status error';
        err.textContent = msg;
        err.style.marginBottom = '12px';
        card.insertBefore(err, card.firstChild);
      }
    }

    async function loadFriends() {
      try {
        const res = await fetch('/api/friends');
        if (!res.ok) throw new Error('Server returned ' + res.status);
        const data = await res.json();

        if (!data || !data.success) {
          document.getElementById('friendsList').innerHTML =
            '<div class="empty-list" style="color: var(--red);">⚠ Could not load friends — try refreshing.</div>';
          return;
        }

        renderFriends(data.friends || []);
        renderPending(data.pending || []);
      } catch (err) {
        console.error('Failed to load friends:', err);
        document.getElementById('friendsList').innerHTML =
          '<div class="empty-list" style="color: var(--red);">⚠ Failed to load friends. Check your connection.</div>';
      }
    }

    function renderFriends(friends) {
      const container = document.getElementById('friendsList');
      if (!friends || friends.length === 0) {
        container.innerHTML = '<div class="empty-list">No friends yet. Add one above!</div>';
        return;
      }

      container.innerHTML = '';
      friends.forEach(f => {
        const item = document.createElement('div');
        item.className = 'friend-item';
        item.innerHTML = `
          <div class="friend-info">
            <span class="friend-name">${escapeText(f.username)}</span>
            <span class="friend-elo">${f.elo || '1200'} ELO</span>
          </div>
          <button class="btn-danger-sm" data-friend-id="${f.id}">Remove</button>
        `;
        item.querySelector('.btn-danger-sm').addEventListener('click', () => removeFriend(f.id));
        container.appendChild(item);
      });
    }

    function renderPending(pending) {
      const card = document.getElementById('pendingCard');
      const container = document.getElementById('pendingList');

      if (!pending || pending.length === 0) {
        card.style.display = 'none';
        return;
      }

      card.style.display = 'block';
      container.innerHTML = '';
      pending.forEach(p => {
        const item = document.createElement('div');
        item.className = 'friend-item pending';
        item.innerHTML = `
          <div class="friend-info">
            <span class="friend-name">${escapeText(p.username)}</span>
            <span class="friend-elo">${p.elo || '1200'} ELO</span>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn-accept-sm" data-request-id="${p.id}">Accept</button>
            <button class="btn-decline-sm" data-request-id="${p.id}">Decline</button>
          </div>
        `;
        item.querySelector('.btn-accept-sm').addEventListener('click', () => acceptRequest(p.id));
        item.querySelector('.btn-decline-sm').addEventListener('click', () => declineRequest(p.id));
        container.appendChild(item);
      });
    }

    async function addFriend() {
      const username = document.getElementById('friendUsername').value.trim();
      const statusEl = document.getElementById('addFriendStatus');

      if (!username) {
        statusEl.textContent = 'Enter a username';
        statusEl.className = 'friend-status error';
        return;
      }

      if (username === currentUser.username) {
        statusEl.textContent = "You can't friend yourself";
        statusEl.className = 'friend-status error';
        return;
      }

      statusEl.textContent = 'Sending...';
      statusEl.className = 'friend-status';

      try {
        const res = await fetch('/api/friends/request', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ friendUsername: username })
        });
        if (!res.ok) throw new Error('Server error ' + res.status);
        const data = await res.json();

        if (data.success) {
          statusEl.textContent = data.message || 'Request sent!';
          statusEl.className = 'friend-status success';
          document.getElementById('friendUsername').value = '';
          await loadFriends();
        } else {
          statusEl.textContent = data.message || 'Failed';
          statusEl.className = 'friend-status error';
        }
      } catch (err) {
        statusEl.textContent = 'Network error — try again';
        statusEl.className = 'friend-status error';
      }
    }

    async function acceptRequest(requestId) {
      try {
        const res = await fetch('/api/friends/accept', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requestId })
        });
        if (res.ok) await loadFriends();
      } catch (err) {
        console.error('Accept failed:', err);
      }
    }

    async function declineRequest(requestId) {
      try {
        const res = await fetch('/api/friends/decline', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ requestId })
        });
        if (res.ok) await loadFriends();
      } catch (err) {
        console.error('Decline failed:', err);
      }
    }

    async function removeFriend(friendId) {
      if (!confirm('Remove this friend?')) return;
      try {
        const res = await fetch('/api/friends/remove', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ friendId })
        });
        if (res.ok) await loadFriends();
      } catch (err) {
        console.error('Remove failed:', err);
      }
    }

    function escapeText(str) {
      if (!str) return '';
      return str.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>').replace(/"/g, '"').replace(/'/g, '&#39;');
    }

    init();
  </script>
</body>
</html>
